name: Test Specific IDs

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'Comma-separated list of IDs to test'
        required: false
        default: '25050119,26459004'

jobs:
  test-specific-ids:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      # Chrome はセルフホストランナー(VPS)に事前インストール済み。
      # 旧来の `sudo apt-get install google-chrome-stable` は最小権限runner(sudo無し)では
      # 失敗し、かつ不要なため削除した。

      - name: Create test IDs file
        run: |
          echo '["${{ github.event.inputs.ids }}"]' | tr ',' '",' | sed 's/,"/","/g' > invalid_ids.json
          cat invalid_ids.json
          
      - name: Run test script
        run: |
          python test_specific_ids.py
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test_*.png
            test_*.log
            test_problematic_ids.log
